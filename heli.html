<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RP-HELI — City Flight</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060b10;--surf:#0c1520;--border:#182538;
  --accent:#00d4ff;--green:#00e676;--orange:#ff6b35;
  --muted:#365060;--text:#afc8d8;--red:#ff7070;
  --mono:'Share Tech Mono',monospace;
  --sans:'Noto Sans JP',sans-serif;
}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{background:var(--bg);color:var(--text);font-family:var(--sans);touch-action:none}
#map{position:fixed;inset:0}
.maplibregl-ctrl-attrib{font-size:9px;opacity:0.7}

/* ===== HUD ===== */
#hud{position:fixed;inset:0;pointer-events:none;font-family:var(--mono);z-index:10}

#topbar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;gap:10px;
  padding:calc(6px + env(safe-area-inset-top)) 12px 6px;
  background:linear-gradient(rgba(6,11,16,0.85),rgba(6,11,16,0));
}
.logo{font-size:15px;color:var(--accent);letter-spacing:4px;text-shadow:0 0 16px rgba(0,212,255,0.4)}
.logo-sub{font-size:8px;color:var(--muted);letter-spacing:3px;margin-top:1px}
#loc-name{margin-left:auto;font-size:10px;color:var(--green);letter-spacing:1px;text-align:right}
#menu-btn{
  pointer-events:auto;cursor:pointer;flex-shrink:0;
  background:rgba(12,21,32,0.9);border:1px solid var(--border);border-radius:3px;
  color:var(--accent);font-family:var(--mono);font-size:10px;letter-spacing:2px;
  padding:6px 10px;
}

/* instrument strip */
#inst{
  position:absolute;top:calc(44px + env(safe-area-inset-top));left:0;right:0;
  display:flex;justify-content:center;gap:8px;padding:0 10px;
}
.gauge{
  background:rgba(6,11,16,0.72);border:1px solid var(--border);border-radius:3px;
  padding:4px 10px;min-width:70px;text-align:center;
}
.gauge .lbl{font-size:7px;color:var(--muted);letter-spacing:2px}
.gauge .val{font-size:16px;color:var(--accent);letter-spacing:1px;line-height:1.2}
.gauge .unit{font-size:8px;color:var(--muted)}
#g-hdg .val{color:var(--green)}
#g-vsi .val.up{color:var(--green)}
#g-vsi .val.dn{color:var(--orange)}

/* crosshair */
#xhair{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);opacity:0.85}

/* sticks */
.stick-zone{
  position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));
  width:132px;height:132px;z-index:20;pointer-events:auto;touch-action:none;
}
#stick-l{left:16px}
#stick-r{right:16px}
.stick-base{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(0,212,255,0.35);
  background:radial-gradient(circle,rgba(0,212,255,0.05),rgba(6,11,16,0.55) 70%);
  box-shadow:inset 0 0 20px rgba(0,212,255,0.06);
}
.stick-knob{
  position:absolute;left:50%;top:50%;width:52px;height:52px;border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle at 35% 30%,#12384a,#081820);
  border:1px solid var(--accent);
  box-shadow:0 0 12px rgba(0,212,255,0.35);
}
.stick-lbl{
  position:absolute;width:100%;text-align:center;top:-16px;
  font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:2px;
}
.stick-arrows{position:absolute;inset:0;font-family:var(--mono);font-size:8px;color:rgba(0,212,255,0.5)}
.stick-arrows span{position:absolute}
.sa-t{top:6px;left:50%;transform:translateX(-50%)}
.sa-b{bottom:6px;left:50%;transform:translateX(-50%)}
.sa-l{left:8px;top:50%;transform:translateY(-50%)}
.sa-r{right:8px;top:50%;transform:translateY(-50%)}

/* hint */
#hint{
  position:fixed;left:50%;bottom:calc(160px + env(safe-area-inset-bottom));
  transform:translateX(-50%);z-index:15;pointer-events:none;
  background:rgba(6,11,16,0.85);border:1px solid var(--border);border-radius:3px;
  font-family:var(--mono);font-size:10px;color:var(--text);
  padding:8px 14px;letter-spacing:1px;text-align:center;line-height:1.7;
  transition:opacity 1s;white-space:nowrap;
}
#hint.gone{opacity:0}

/* loading */
#loading{
  position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  font-family:var(--mono);transition:opacity .6s;
}
#loading.gone{opacity:0;pointer-events:none}
#loading .logo{font-size:24px}
#load-msg{font-size:10px;color:var(--muted);letter-spacing:2px}
.spinner{
  width:34px;height:34px;border-radius:50%;
  border:2px solid var(--border);border-top-color:var(--accent);
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* city menu */
#menu{
  position:fixed;inset:0;z-index:60;background:rgba(6,11,16,0.9);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  backdrop-filter:blur(4px);
}
#menu.open{display:flex}
#menu h2{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:4px;margin-bottom:8px}
.city-btn{
  width:250px;background:var(--surf);border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-family:var(--mono);font-size:12px;letter-spacing:1px;
  padding:11px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
}
.city-btn:active{border-color:var(--accent);color:var(--accent)}
.city-btn .cc{font-size:9px;color:var(--muted)}
#menu-close{
  margin-top:14px;background:none;border:1px solid rgba(255,68,68,0.35);border-radius:2px;
  color:var(--red);font-family:var(--mono);font-size:10px;letter-spacing:2px;
  padding:6px 22px;cursor:pointer;
}
</style>
</head>
<body>

<div id="map"></div>

<div id="hud">
  <div id="topbar">
    <div>
      <div class="logo">RP-HELI</div>
      <div class="logo-sub">CITY FLIGHT SIM</div>
    </div>
    <div id="loc-name">SHINJUKU / TOKYO</div>
    <button id="menu-btn">MAP</button>
  </div>
  <div id="inst">
    <div class="gauge" id="g-alt"><div class="lbl">ALT</div><div class="val" id="v-alt">0</div><div class="unit">m</div></div>
    <div class="gauge" id="g-spd"><div class="lbl">SPD</div><div class="val" id="v-spd">0</div><div class="unit">km/h</div></div>
    <div class="gauge" id="g-hdg"><div class="lbl">HDG</div><div class="val" id="v-hdg">000</div><div class="unit" id="v-hdgc">N</div></div>
    <div class="gauge" id="g-vsi"><div class="lbl">V/S</div><div class="val" id="v-vsi">0.0</div><div class="unit">m/s</div></div>
  </div>
  <svg id="xhair" width="56" height="56" viewBox="0 0 56 56" fill="none">
    <line x1="4" y1="28" x2="18" y2="28" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="38" y1="28" x2="52" y2="28" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="28" y1="34" x2="28" y2="42" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="28" cy="28" r="2.5" stroke="#00d4ff" stroke-width="1.5"/>
  </svg>
</div>

<div class="stick-zone" id="stick-l">
  <div class="stick-lbl">COLLECTIVE / YAW</div>
  <div class="stick-base"></div>
  <div class="stick-arrows"><span class="sa-t">▲UP</span><span class="sa-b">▼DN</span><span class="sa-l">◀</span><span class="sa-r">▶</span></div>
  <div class="stick-knob"></div>
</div>
<div class="stick-zone" id="stick-r">
  <div class="stick-lbl">CYCLIC</div>
  <div class="stick-base"></div>
  <div class="stick-arrows"><span class="sa-t">▲FWD</span><span class="sa-b">▼AFT</span><span class="sa-l">◀</span><span class="sa-r">▶</span></div>
  <div class="stick-knob"></div>
</div>

<div id="hint">左スティック: 上昇/下降・旋回<br>右スティック: 前進/後退・横移動</div>

<div id="menu">
  <h2>SELECT AREA</h2>
  <button id="menu-close">CLOSE</button>
</div>

<div id="loading">
  <div class="logo">RP-HELI</div>
  <div class="spinner"></div>
  <div id="load-msg">LOADING CITY DATA...</div>
</div>

<script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
<script>
'use strict';

/* ================= CITIES ================= */
const CITIES = [
  {name:'SHINJUKU / TOKYO', jp:'新宿',       lng:139.6950, lat:35.6890, alt:160, hdg:300},
  {name:'MARUNOUCHI / TOKYO', jp:'東京駅',   lng:139.7700, lat:35.6790, alt:150, hdg:315},
  {name:'SHIBUYA / TOKYO', jp:'渋谷',        lng:139.7030, lat:35.6580, alt:130, hdg:330},
  {name:'UMEDA / OSAKA', jp:'大阪 梅田',     lng:135.4990, lat:34.6990, alt:150, hdg:315},
  {name:'MEIEKI / NAGOYA', jp:'名古屋駅',    lng:136.8850, lat:35.1680, alt:150, hdg:290},
  {name:'MANHATTAN / NYC', jp:'ニューヨーク', lng:-73.9840, lat:40.7440, alt:220, hdg:20},
];

/* ================= STATE ================= */
/* クラッシュや再読み込みに備えて前回位置から再開する */
const SAVED = (() => {
  try { return JSON.parse(localStorage.getItem('rpheli-state')); } catch { return null; }
})();
const S = {
  lng:SAVED?.lng ?? CITIES[0].lng, lat:SAVED?.lat ?? CITIES[0].lat,
  alt:SAVED?.alt ?? CITIES[0].alt, hdg:SAVED?.hdg ?? CITIES[0].hdg,
  vf:0, vl:0, vv:0,        // 機体基準の速度 m/s (前, 右, 上)
  pitchVis:0, rollVis:0,   // 表示用の姿勢角(度)
};
function saveState() {
  try {
    localStorage.setItem('rpheli-state', JSON.stringify({
      lng:S.lng, lat:S.lat, alt:S.alt, hdg:S.hdg,
      name:document.getElementById('loc-name').textContent,
    }));
  } catch {}
}
setInterval(saveState, 2000);
addEventListener('pagehide', saveState);
const LIMIT = {vf:55, vb:22, vl:20, vv:13, yawRate:75, altMin:4, altMax:4000};

/* 入力: -1..1 (fwd=前+, lat=右+, col=上+, yaw=右+) */
const input = {fwd:0, lat:0, col:0, yaw:0};

/* ================= MAP ================= */
const map = new maplibregl.Map({
  container:'map',
  style:'https://tiles.openfreemap.org/styles/liberty',
  center:[S.lng, S.lat],
  zoom:15.5, pitch:60, bearing:S.hdg,
  maxPitch:135, maxZoom:24,
  rollEnabled:true, centerClampedToGround:false,
  interactive:false, attributionControl:{compact:true},
  fadeDuration:0,
  canvasContextAttributes:{antialias:true},
  // メモリ対策: 高解像度端末でも描画解像度を抑え、タイルの保持数を減らす
  pixelRatio:Math.min(window.devicePixelRatio || 1, 1.75),
  maxTileCacheSize:96,
  maxTileCacheZoomLevels:3,
});

map.on('style.load', () => {
  map.setSky({
    'sky-color':'#1f3a52',
    'horizon-color':'#c9dae4',
    'fog-color':'#aebfcb',
    'sky-horizon-blend':0.6,
    'horizon-fog-blend':0.6,
    'fog-ground-blend':0.85,
    'atmosphere-blend':['interpolate',['linear'],['zoom'],10,1,12,0.5,14,0.25],
  });
  // 3Dビルを強調: スタイル既定では低空(z14+)でしか描画されないため、
  // より遠くから表示し、高さも誇張して立体感を出す
  const EXAG = 1.35;
  const style = map.getStyle();
  // メモリ対策: 文字・アイコン類は地名ラベル以外すべて除去
  // (POIや道路名のグリフ/アイコンはメモリ消費が大きく、飛行中はほぼ読めない)
  for (const l of [...style.layers]) {
    if (l.type === 'symbol' && !l.id.startsWith('place')) map.removeLayer(l.id);
  }
  const has3d = style.layers.some(l => l.type === 'fill-extrusion');
  for (const l of style.layers) {
    if (l.type !== 'fill-extrusion') continue;
    map.setLayerZoomRange(l.id, 13, 24);
    map.setPaintProperty(l.id, 'fill-extrusion-height',
      ['*', EXAG, ['coalesce', ['get','render_height'], ['get','height'], 10]]);
    map.setPaintProperty(l.id, 'fill-extrusion-base',
      ['coalesce', ['get','render_min_height'], ['get','min_height'], 0]);
    map.setPaintProperty(l.id, 'fill-extrusion-opacity', 1);
  }
  // スタイルに3Dビルが無い場合のフォールバック
  if (!has3d) {
    const srcEntry = Object.entries(style.sources).find(([,v]) => v.type === 'vector');
    if (srcEntry) {
      map.addLayer({
        id:'rp-building-3d', type:'fill-extrusion', source:srcEntry[0],
        'source-layer':'building', minzoom:13,
        paint:{
          'fill-extrusion-height':['*',1.35,['coalesce',['get','render_height'],['get','height'],10]],
          'fill-extrusion-base':['coalesce',['get','render_min_height'],['get','min_height'],0],
          'fill-extrusion-color':['interpolate',['linear'],['coalesce',['get','render_height'],8],
            0,'#9aa7b0', 60,'#b8c4cc', 200,'#dde6ec'],
          'fill-extrusion-opacity':1,
        },
      });
    }
  }
});

map.on('load', () => {
  document.getElementById('loading').classList.add('gone');
  setTimeout(() => document.getElementById('hint').classList.add('gone'), 6000);
  running = true;
  last = performance.now();
  requestAnimationFrame(tick);
});
// WebGLコンテキスト喪失(メモリ逼迫等)時は保存済み位置から自動復帰
map.getCanvas().addEventListener('webglcontextlost', () => { saveState(); location.reload(); });

map.on('error', e => {
  const msg = document.getElementById('load-msg');
  if (msg && !running) msg.textContent = 'LOAD ERROR — 通信環境を確認してください';
});

/* ================= VIRTUAL STICKS ================= */
function makeStick(zoneId, onMove) {
  const zone = document.getElementById(zoneId);
  const knob = zone.querySelector('.stick-knob');
  const R = 42; // ノブ可動半径 px
  let pid = null;
  const set = (dx, dy) => {
    const len = Math.hypot(dx, dy);
    if (len > R) { dx *= R/len; dy *= R/len; }
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    const dead = v => Math.abs(v) < 0.09 ? 0 : (v - Math.sign(v)*0.09) / 0.91;
    onMove(dead(dx/R), dead(dy/R));
  };
  zone.addEventListener('pointerdown', e => {
    if (pid !== null) return;
    pid = e.pointerId;
    zone.setPointerCapture(pid);
    const r = zone.getBoundingClientRect();
    set(e.clientX - r.left - r.width/2, e.clientY - r.top - r.height/2);
    e.preventDefault();
  });
  zone.addEventListener('pointermove', e => {
    if (e.pointerId !== pid) return;
    const r = zone.getBoundingClientRect();
    set(e.clientX - r.left - r.width/2, e.clientY - r.top - r.height/2);
    e.preventDefault();
  });
  const end = e => {
    if (e.pointerId !== pid) return;
    pid = null;
    knob.style.transform = 'translate(-50%,-50%)';
    onMove(0, 0);
  };
  zone.addEventListener('pointerup', end);
  zone.addEventListener('pointercancel', end);
}
makeStick('stick-l', (x, y) => { input.yaw = x; input.col = -y; });
makeStick('stick-r', (x, y) => { input.lat = x; input.fwd = -y; });

/* ================= KEYBOARD (PC予備) ================= */
const keys = {};
addEventListener('keydown', e => { keys[e.code] = true; });
addEventListener('keyup',   e => { keys[e.code] = false; });
function applyKeys() {
  // キーが押されている間のみタッチ入力を上書きする(離すとタッチ側の値に戻る)
  const k = keys;
  if (k.KeyW || k.ArrowUp) input.fwd = 1; else if (k.KeyS || k.ArrowDown) input.fwd = -1;
  if (k.KeyA) input.lat = -1; else if (k.KeyD) input.lat = 1;
  if (k.ArrowLeft || k.KeyQ) input.yaw = -1; else if (k.ArrowRight || k.KeyE) input.yaw = 1;
  if (k.ShiftLeft || k.ShiftRight || k.Space) input.col = 1;
  else if (k.ControlLeft || k.ControlRight || k.KeyZ) input.col = -1;
}

/* ================= PHYSICS + RENDER ================= */
let running = false;
let last = 0;
const lerp = (a, b, t) => a + (b - a) * Math.min(1, t);

function tick(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  applyKeys();

  // 旋回
  S.hdg = (S.hdg + input.yaw * LIMIT.yawRate * dt + 360) % 360;

  // 速度(機体基準)を目標値へなめらかに追従
  const tvf = input.fwd >= 0 ? input.fwd * LIMIT.vf : input.fwd * LIMIT.vb;
  S.vf = lerp(S.vf, tvf,               dt * 1.8);
  S.vl = lerp(S.vl, input.lat * LIMIT.vl, dt * 1.8);
  S.vv = lerp(S.vv, input.col * LIMIT.vv, dt * 2.4);

  // 機体基準 → 東西南北 → 緯度経度
  const h = S.hdg * Math.PI / 180;
  const dE = (S.vf * Math.sin(h) + S.vl * Math.cos(h)) * dt;
  const dN = (S.vf * Math.cos(h) - S.vl * Math.sin(h)) * dt;
  S.lat += dN / 111320;
  S.lng += dE / (111320 * Math.cos(S.lat * Math.PI / 180));
  S.alt = Math.max(LIMIT.altMin, Math.min(LIMIT.altMax, S.alt + S.vv * dt));
  if (S.alt <= LIMIT.altMin && S.vv < 0) S.vv = 0;

  // 表示姿勢(アーケード: 入力に応じて機体を傾ける)
  S.pitchVis = lerp(S.pitchVis, input.fwd * 11, dt * 3);
  S.rollVis  = lerp(S.rollVis,  input.lat * 16 + input.yaw * 7, dt * 3);

  // カメラ更新(機体位置=カメラ位置)。基準84°=やや下向きで街並みが見える
  const camPitch = Math.max(50, Math.min(115, 84 - S.pitchVis));
  try {
    const opts = map.calculateCameraOptionsFromCameraLngLatAltRotation(
      [S.lng, S.lat], S.alt, S.hdg, camPitch, S.rollVis);
    map.jumpTo(opts);
  } catch (err) { /* スタイル読込中などは無視 */ }

  updateHUD();
  requestAnimationFrame(tick);
}

/* ================= HUD ================= */
const $ = id => document.getElementById(id);
const COMPASS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
let hudT = 0;
function updateHUD() {
  $('v-alt').textContent = Math.round(S.alt);
  $('v-spd').textContent = Math.round(Math.hypot(S.vf, S.vl) * 3.6);
  $('v-hdg').textContent = String(Math.round(S.hdg) % 360).padStart(3, '0');
  $('v-hdgc').textContent = COMPASS[Math.round(S.hdg / 22.5) % 16];
  const vsi = $('v-vsi');
  vsi.textContent = (S.vv >= 0 ? '+' : '') + S.vv.toFixed(1);
  vsi.classList.toggle('up', S.vv > 0.5);
  vsi.classList.toggle('dn', S.vv < -0.5);
}

/* ================= CITY MENU ================= */
const menu = $('menu');
CITIES.forEach(c => {
  const b = document.createElement('button');
  b.className = 'city-btn';
  b.innerHTML = `<span>${c.jp}</span><span class="cc">${c.name}</span>`;
  b.addEventListener('click', () => {
    S.lng = c.lng; S.lat = c.lat; S.alt = c.alt; S.hdg = c.hdg;
    S.vf = S.vl = S.vv = 0; S.pitchVis = S.rollVis = 0;
    $('loc-name').textContent = c.name;
    menu.classList.remove('open');
  });
  menu.insertBefore(b, $('menu-close'));
});
$('menu-btn').addEventListener('click', () => menu.classList.add('open'));
if (SAVED?.name) $('loc-name').textContent = SAVED.name;
$('menu-close').addEventListener('click', () => menu.classList.remove('open'));
</script>
</body>
</html>
