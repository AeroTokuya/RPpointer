<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RPpointer — Point Navigation</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060b10;--surf:#0c1520;--border:#182538;
  --accent:#00d4ff;--green:#00e676;--orange:#ff6b35;
  --muted:#365060;--text:#afc8d8;--red:#ff7070;
  --mono:'Share Tech Mono',monospace;
  --sans:'Noto Sans JP',sans-serif;
}
body{
  background:var(--bg);color:var(--text);font-family:var(--sans);
  min-height:100vh;max-width:500px;margin:0 auto;
  background-image:
    linear-gradient(rgba(0,212,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.018) 1px,transparent 1px);
  background-size:30px 30px;
}

/* HEADER */
#header{
  position:sticky;top:0;z-index:51;
  background:rgba(6,11,16,0.97);border-bottom:1px solid var(--border);
  padding:9px 14px;display:flex;align-items:center;gap:10;
  backdrop-filter:blur(8px);
}
.logo{font-family:var(--mono);font-size:17px;color:var(--accent);letter-spacing:4px;text-shadow:0 0 16px rgba(0,212,255,0.4)}
.logo-sub{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:3px;margin-top:1px}
#sync-badge{margin-left:auto;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:var(--green)}
.pulse-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}

/* GPS BAR */
#gps-bar{
  background:#050a0f;border-bottom:1px solid var(--border);
  padding:5px 14px;display:flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:10px;
  position:sticky;top:38px;z-index:48;
}
#gps-label{font-size:8px;color:var(--muted);letter-spacing:2px}
#gps-coords{color:var(--green);flex:1}
#gps-acc{color:var(--muted);font-size:9px;text-align:right}

/* HSI BLOCK */
#hsi-block{background:var(--surf);border-bottom:1px solid var(--border);padding:16px 12px 12px;display:flex;flex-direction:column;align-items:center;gap:10px}

/* DEST row */
#dest-row{
  width:100%;display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1px solid var(--border);border-radius:3px;
  padding:8px 12px;font-family:var(--mono);
}
#dest-label{font-size:8px;color:var(--muted);letter-spacing:2px;flex-shrink:0}
#dest-id{font-size:14px;color:var(--accent);letter-spacing:1px;flex-shrink:0}
#dest-name{font-size:12px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#dest-none{font-size:10px;color:var(--muted);flex:1}
#dest-clr{
  background:none;border:1px solid rgba(255,68,68,0.35);border-radius:2px;
  color:var(--red);font-family:var(--mono);font-size:9px;padding:2px 8px;cursor:pointer;flex-shrink:0;
}

/* Canvas */
#hsi-canvas{border-radius:50%;display:block;box-shadow:0 0 36px rgba(0,212,255,0.13),0 0 70px rgba(0,0,0,0.7)}

/* Digital 4-box */
#digi-grid{width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:2px;overflow:hidden}
.digi-cell{background:var(--bg);padding:10px 6px;text-align:center}
.digi-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:3px}
.digi-val{font-family:var(--mono);font-size:20px;line-height:1;letter-spacing:1px}
.digi-unit{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:2px}
#gs-input{
  width:52px;background:transparent;border:none;border-bottom:1px solid var(--border);
  color:var(--accent);font-family:var(--mono);font-size:18px;text-align:center;outline:none;padding:0 2px;
}

/* IMPORT BAR */
#import-bar{background:#080e16;border-bottom:1px solid var(--border);padding:10px 12px}
#import-row{display:flex;gap:8px;align-items:center}
.btn{font-family:var(--mono);font-size:11px;letter-spacing:1px;border-radius:2px;cursor:pointer;border:none;transition:all 0.2s}
#btn-import{flex:1;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.3);color:var(--accent);padding:9px;letter-spacing:1px}
#btn-addwp{background:rgba(0,212,255,0.06);border:1px solid var(--border);color:var(--muted);padding:9px 14px}
#btn-clrdb{background:rgba(255,68,68,0.07);border:1px solid rgba(255,68,68,0.3);color:var(--red);padding:9px 12px;display:none}
#import-info{margin-top:7px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}
#file-input{display:none}

/* WP LIST */
#wp-section{display:none}
#search-bar{padding:8px 10px;border-bottom:1px solid var(--border);background:#060b10}
#search-input{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:2px;
  color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 11px;outline:none;
  -webkit-appearance:none;
}
#col-header{
  padding:5px 12px;background:#050910;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:2px;
  display:flex;gap:8px;
}
.col-id{width:60px;flex-shrink:0}
.col-name{flex:1}
.col-nm{width:54px;text-align:right;flex-shrink:0}
#wp-list{max-height:38vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.wp-row{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  border-bottom:1px solid rgba(24,37,56,0.6);cursor:pointer;
  border-left:3px solid transparent;transition:background 0.12s;
}
.wp-row:hover{background:rgba(0,212,255,0.04)}
.wp-row.selected{background:rgba(0,212,255,0.09);border-left-color:var(--accent)}
.wp-row-id{font-family:var(--mono);font-size:12px;color:#4a7a90;width:60px;letter-spacing:1px;flex-shrink:0}
.wp-row.selected .wp-row-id{color:var(--accent)}
.wp-row-info{flex:1;min-width:0}
.wp-row-name{font-size:12px;color:#7a9aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wp-row.selected .wp-row-name{color:var(--text)}
.wp-row-desc{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wp-row-nm{font-family:var(--mono);font-size:12px;color:var(--muted);flex-shrink:0;width:54px;text-align:right}
.wp-row.selected .wp-row-nm{color:var(--accent)}
#wp-overflow{padding:12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;letter-spacing:1px;display:none}

/* MODAL */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(6px);
  z-index:100;display:none;align-items:center;justify-content:center;padding:0 18px;
}
#modal-overlay.active{display:flex}
#modal-box{
  background:#0c1828;border:1px solid var(--accent);border-radius:4px;padding:22px;
  width:100%;max-width:340px;box-shadow:0 0 40px rgba(0,212,255,0.18);
}
.modal-title{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:18px}
.form-group{margin-bottom:11px}
.form-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:4px;display:block}
.form-inp{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:2px;
  color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 11px;outline:none;-webkit-appearance:none;
}
.modal-btns{display:flex;gap:8px;margin-top:14px}
#modal-add{flex:1;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.4);border-radius:2px;color:var(--accent);font-family:var(--mono);font-size:11px;padding:9px;cursor:pointer}
#modal-cancel{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.35);border-radius:2px;color:var(--red);font-family:var(--mono);font-size:11px;padding:9px 14px;cursor:pointer}

/* TOAST */
#toast{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);
  background:#0c1828;border-radius:3px;padding:8px 18px;
  font-family:var(--mono);font-size:11px;z-index:200;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.6);
  transition:transform 0.3s,opacity 0.3s;opacity:0;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#182538;border-radius:2px}
input[type=number]::-webkit-inner-spin-button{opacity:0.25}

/* TABS */
#tab-bar{
  display:flex;background:#060b10;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:49;
}
.tab-btn{
  flex:1;padding:10px 0;font-family:var(--mono);font-size:11px;letter-spacing:2px;
  color:var(--muted);background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.2s;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* MAP */
#map-block{display:none;height:calc(100vh - 120px);position:relative;}
#map{width:100%;height:100%;}
.leaflet-container{background:#0a1520;}
#map-info{display:none}
.map-corner{
  position:absolute;z-index:1000;
  background:rgba(0,0,0,0.82);border:1px solid rgba(255,255,255,0.25);border-radius:3px;
  padding:7px 10px;font-family:var(--mono);backdrop-filter:blur(4px);
  min-width:90px;
}
#mc-tl{top:10px;left:10px}
#mc-tr{top:10px;right:10px;text-align:right}
#mc-bl{bottom:30px;left:10px}
#mc-br{bottom:30px;right:10px;text-align:right}
.wp-label .leaflet-tooltip{background:rgba(6,11,16,0.82);border:1px solid #9b5de5;border-radius:3px;color:#c8d8e8;padding:3px 7px;box-shadow:0 0 8px rgba(155,93,229,0.3);white-space:nowrap;pointer-events:none;font-size:11px;}
.wp-label .leaflet-tooltip::before{border-top-color:#9b5de5;}
.mc-lbl{font-size:8px;color:rgba(255,255,255,0.6);letter-spacing:2px;margin-bottom:3px}
.mc-val{font-size:16px;letter-spacing:1px;line-height:1;color:#fff}
.mc-unit{font-size:8px;color:rgba(255,255,255,0.5);margin-top:2px}

/* HSI inline search */
#hsi-search-bar{padding:8px 10px;border-bottom:1px solid var(--border);background:#060b10;display:none}
#hsi-search-input{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:2px;
  color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 11px;outline:none;-webkit-appearance:none;
}
#hsi-wp-list{max-height:35vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#hsi-wp-overflow{padding:12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;letter-spacing:1px;display:none}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div>
    <div class="logo">RPpointer</div>
    <div class="logo-sub">POINT NAVIGATION</div>
  </div>
  <div id="sync-badge">
    <div class="pulse-dot"></div>
    <span id="sync-txt">READY</span>
  </div>
</div>


<!-- TAB BAR -->
<div id="tab-bar">
  <button class="tab-btn active" id="tab-hsi" onclick="switchTab('hsi')">HSI</button>
  <button class="tab-btn" id="tab-map" onclick="switchTab('map')">MAP</button>
  <button class="tab-btn" id="tab-list" onclick="switchTab('list')">WP LIST</button>
</div>
<!-- GPS BAR -->
<div id="gps-bar">
  <span id="gps-label">GPS</span>
  <span id="gps-coords" style="color:#ffcc02">取得中...</span>
  <span id="gps-acc"></span>
</div>

<!-- MAP BLOCK -->
<div id="map-block">
  <div id="map"></div>
  <div id="map-info"></div>
  <div class="map-corner" id="mc-tl"><div class="mc-lbl">BRG</div><div class="mc-val" id="mc-brg" style="color:#ff6b35">---°</div></div>
  <div class="map-corner" id="mc-tr"><div class="mc-lbl">DIST</div><div class="mc-val" id="mc-dist" style="color:#00d4ff">---</div><div class="mc-unit">NM</div></div>
  <div class="map-corner" id="mc-bl"><div class="mc-lbl">ETE</div><div class="mc-val" id="mc-ete" style="color:#00e676">--:--</div></div>
  <div class="map-corner" id="mc-br"><div class="mc-lbl">ETA JST</div><div class="mc-val" id="mc-eta" style="color:#ffcc02;font-size:13px">--:--</div></div>
</div>
<!-- HSI BLOCK -->
<div id="hsi-block">
  <!-- DEST ROW -->
  <div id="dest-row">
    <span id="dest-label">DEST</span>
    <span id="dest-none">-- 下のリストからWPを選択 --</span>
    <span id="dest-id" style="display:none"></span>
    <span id="dest-name" style="display:none"></span>
    <button id="dest-clr" style="display:none" onclick="clearSel()">CLR</button>
  </div>

  <!-- HSI Canvas -->
  <canvas id="hsi-canvas" width="260" height="260"></canvas>

  <!-- GS + Digital 4-box row -->
  <div style="width:100%;display:flex;align-items:stretch;gap:1px;background:var(--border);border-radius:2px;overflow:hidden">
    <!-- GS (左側) -->
    <div style="background:var(--bg);padding:10px 8px;text-align:center;display:flex;flex-direction:column;justify-content:center;min-width:64px;flex-shrink:0">
      <div class="digi-lbl">GS</div>
      <div style="display:flex;align-items:center;justify-content:center">
        <input id="gs-input" type="number" value="120" min="1" max="999" oninput="onGsChange()"
          style="width:52px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--accent);font-family:var(--mono);font-size:18px;text-align:center;outline:none;padding:0 2px;">
      </div>
      <div class="digi-unit">kt</div>
    </div>
    <!-- 4 gauges -->
    <div id="digi-grid" style="flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)">
      <div class="digi-cell">
        <div class="digi-lbl">BRG</div>
        <div class="digi-val" id="d-brg" style="color:#ff6b35;text-shadow:0 0 12px rgba(255,107,53,0.4)">---°</div>
      </div>
      <div class="digi-cell">
        <div class="digi-lbl">DIST</div>
        <div class="digi-val" id="d-dist" style="color:#00d4ff;text-shadow:0 0 12px rgba(0,212,255,0.4)">---</div>
        <div class="digi-unit">NM</div>
      </div>
      <div class="digi-cell">
        <div class="digi-lbl">ETE</div>
        <div class="digi-val" id="d-ete" style="color:#00e676;text-shadow:0 0 12px rgba(0,230,118,0.3)">--:--</div>
      </div>
      <div class="digi-cell">
        <div class="digi-lbl">ETA JST</div>
        <div class="digi-val" id="d-eta" style="color:#ffcc02;text-shadow:0 0 12px rgba(255,204,2,0.3);font-size:15px">--:--</div>
      </div>
    </div>
  </div>
</div>

<!-- HSI WP SEARCH -->
<div id="hsi-wp-section" style="display:none;border-top:1px solid var(--border)">
  <div style="padding:8px 10px;background:#060b10;border-bottom:1px solid var(--border)">
    <input id="hsi-s-input" type="text" placeholder="SEARCH..."
      style="width:100%;background:var(--bg);border:2px solid var(--accent);border-radius:3px;color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 11px;outline:none;-webkit-appearance:none;box-shadow:0 0 8px rgba(0,212,255,0.25);"
      oninput="onHsiSearch()">
  </div>
  <div style="padding:5px 12px;background:#050910;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:2px;display:flex;gap:8px;">
    <span style="width:60px;flex-shrink:0">IDENT</span>
    <span style="flex:1">NAME</span>
    <span id="hsi-nm-hdr" style="width:54px;text-align:right;flex-shrink:0;display:none">NM</span>
  </div>
  <div id="hsi-list" style="max-height:40vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent"></div>
  <div id="hsi-overflow" style="display:none;padding:12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center">…絞り込んでください（表示上限500件）</div>
</div>

<!-- IMPORT BAR -->
<div id="import-bar">
  <div id="import-row">
    <button class="btn" id="btn-import" onclick="document.getElementById('file-input').click()">📂  GPX / KML / KMZ インポート</button>
    <button class="btn" id="btn-addwp" onclick="openModal()">＋WP</button>
    <button class="btn" id="btn-clrdb" onclick="clearDB()">CLR</button>
    <input id="file-input" type="file" accept=".gpx,.kml,.kmz" onchange="handleFile(event)">
  </div>
  <div id="import-info" style="display:none"></div>
  <div id="import-hint" style="margin-top:7px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px">
    GPX / KML / KMZファイルをインポートしてWPを追加してください
  </div>
</div>

<!-- WP LIST -->
<div id="wp-section" style="display:none">
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="SEARCH..." oninput="onSearch()">
  </div>
  <div id="col-header">
    <span class="col-id">IDENT</span>
    <span class="col-name">NAME</span>
    <span class="col-nm" id="col-nm-hdr" style="display:none">NM</span>
  </div>
  <div id="wp-list"></div>
  <div id="wp-overflow">…絞り込んでください（表示上限500件）</div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box">
    <div class="modal-title">MANUAL WP ENTRY</div>
    <div class="form-group"><label class="form-lbl">IDENT</label><input class="form-inp" id="f-id" placeholder="ABCDE"></div>
    <div class="form-group"><label class="form-lbl">名称</label><input class="form-inp" id="f-name" placeholder="△△ヘリポート"></div>
    <div class="form-group"><label class="form-lbl">緯度 (DD.DDDD)</label><input class="form-inp" id="f-lat" type="number" step="0.0001" placeholder="35.5494"></div>
    <div class="form-group"><label class="form-lbl">経度 (DDD.DDDD)</label><input class="form-inp" id="f-lon" type="number" step="0.0001" placeholder="139.7798"></div>
    <div class="modal-btns">
      <button id="modal-add" onclick="addCustomWP()">ADD</button>
      <button id="modal-cancel" onclick="closeModal()">CANCEL</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let wpDB = [];
let selWp = null;
let pos = null;
let gs = 120;
let watchId = null;
let filtered = [];
let searchQ = '';

// ── Math ─────────────────────────────────────────────────────────────────────
function calcNM(la1,lo1,la2,lo2){
  const R=3440.065,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function calcBrg(la1,lo1,la2,lo2){
  const dLo=(lo2-lo1)*Math.PI/180;
  const y=Math.sin(dLo)*Math.cos(la2*Math.PI/180);
  const x=Math.cos(la1*Math.PI/180)*Math.sin(la2*Math.PI/180)-Math.sin(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.cos(dLo);
  return((Math.atan2(y,x)*180/Math.PI)+360+7+360)%360;
}
function fmtCoord(v,ax){
  const d=v>=0?ax[0]:ax[1],a=Math.abs(v),deg=Math.floor(a);
  return`${d}${String(deg).padStart(ax==='NS'?2:3,'0')}°${((a-deg)*60).toFixed(2)}'`;
}
function fmtEte(nm,g){
  if(!nm||!g||g<=0||nm<=0)return'--:--';
  const tot=Math.round(nm/g*60);
  return`${Math.floor(tot/60)}h${String(tot%60).padStart(2,'0')}m`;
}

// ── GPS ──────────────────────────────────────────────────────────────────────
function startGPS(){
  if(!navigator.geolocation){
    document.getElementById('gps-coords').textContent='GPS非対応';
    document.getElementById('gps-coords').style.color='#ff5555';
    return;
  }
  watchId = navigator.geolocation.watchPosition(
    p=>{
      pos={lat:p.coords.latitude,lon:p.coords.longitude,acc:Math.round(p.coords.accuracy)};
      document.getElementById('gps-coords').style.color='var(--green)';
      document.getElementById('gps-coords').textContent=fmtCoord(pos.lat,'NS')+' '+fmtCoord(pos.lon,'EW');
      document.getElementById('gps-acc').textContent='±'+pos.acc+'m';
      document.getElementById('col-nm-hdr').style.display='';
      updateHSI();
      if(currentTab==='map') updateMap();
      if(currentTab==='hsi') renderHsiList();
      renderList();
    },
    e=>{
      const msg=e.code===1?'GPS許可が必要':'GPS取得失敗';
      document.getElementById('gps-coords').textContent=msg;
      document.getElementById('gps-coords').style.color='#ff5555';
    },
    {enableHighAccuracy:true,maximumAge:0}
  );
}

// ── HSI Canvas ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('hsi-canvas');
const ctx = canvas.getContext('2d');

function drawHSI(brg, active){
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=W/2-6;
  ctx.clearRect(0,0,W,H);

  // Bezel
  const bz=ctx.createRadialGradient(cx,cy,r*0.88,cx,cy,r+5);
  bz.addColorStop(0,'#18283a');bz.addColorStop(1,'#080e16');
  ctx.beginPath();ctx.arc(cx,cy,r+5,0,Math.PI*2);ctx.fillStyle=bz;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r+5,0,Math.PI*2);
  ctx.strokeStyle='#243648';ctx.lineWidth=2;ctx.stroke();

  // Face
  const face=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  face.addColorStop(0,'#091520');face.addColorStop(1,'#030a10');
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=face;ctx.fill();

  // Grid
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
  for(let i=-r;i<r;i+=28){
    ctx.beginPath();ctx.moveTo(cx+i,cy-r);ctx.lineTo(cx+i,cy+r);
    ctx.strokeStyle='rgba(0,212,255,0.025)';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-r,cy+i);ctx.lineTo(cx+r,cy+i);ctx.stroke();
  }
  ctx.restore();

  // Rotating compass rose
  ctx.save();ctx.translate(cx,cy);ctx.rotate(-brg*Math.PI/180);
  for(let i=0;i<360;i+=5){
    const a=i*Math.PI/180,isCard=i%90===0,isMaj=i%10===0;
    const len=isCard?14:isMaj?9:5,ri=r-2,ro=ri-len;
    ctx.beginPath();
    ctx.moveTo(Math.sin(a)*ri,-Math.cos(a)*ri);
    ctx.lineTo(Math.sin(a)*ro,-Math.cos(a)*ro);
    ctx.strokeStyle=isCard?'rgba(0,212,255,0.95)':isMaj?'rgba(0,212,255,0.5)':'rgba(0,212,255,0.18)';
    ctx.lineWidth=isCard?2:isMaj?1.2:0.5;ctx.stroke();
  }
  const lbls=[['N',0],['3',30],['6',60],['E',90],['12',120],['15',150],['S',180],['21',210],['24',240],['W',270],['30',300],['33',330]];
  lbls.forEach(([lbl,deg])=>{
    const a=deg*Math.PI/180,tr=r*0.71;
    ctx.save();ctx.translate(Math.sin(a)*tr,-Math.cos(a)*tr);ctx.rotate(a);
    ctx.font=`bold ${deg%90===0?13:10}px 'Share Tech Mono',monospace`;
    ctx.fillStyle=deg%90===0?'#00d4ff':'rgba(130,185,215,0.7)';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lbl,0,0);
    ctx.restore();
  });
  ctx.restore();

  // Course pointer (green, fixed up = bearing to WP)
  if(active){
    const ar=r*0.80;
    ctx.save();ctx.translate(cx,cy);
    ctx.beginPath();ctx.moveTo(0,-ar);ctx.lineTo(-7,-ar+16);ctx.lineTo(7,-ar+16);ctx.closePath();
    ctx.fillStyle='#00e676';ctx.shadowColor='#00e676';ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(0,-ar+16);ctx.lineTo(0,ar*0.45);
    ctx.strokeStyle='rgba(0,230,118,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);
    ctx.restore();
  }

  // Heading bug (orange triangle, fixed at top)
  ctx.save();ctx.translate(cx,cy);
  ctx.beginPath();
  ctx.moveTo(-6.5,-(r-2));ctx.lineTo(-6.5,-(r-13));
  ctx.lineTo(0,-(r-22));ctx.lineTo(6.5,-(r-13));
  ctx.lineTo(6.5,-(r-2));ctx.closePath();
  ctx.fillStyle='#ff6b35';ctx.shadowColor='#ff6b35';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
  ctx.restore();

  // Aircraft symbol
  ctx.save();ctx.translate(cx,cy);
  ctx.strokeStyle='#ffffff';ctx.lineWidth=2;
  ctx.shadowColor='rgba(255,255,255,0.5)';ctx.shadowBlur=4;
  ctx.beginPath();ctx.moveTo(0,-16);ctx.lineTo(0,18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-16,5);ctx.lineTo(16,5);ctx.stroke();
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-8,16);ctx.lineTo(8,16);ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();

  // HDG readout
  ctx.font="bold 20px 'Share Tech Mono',monospace";
  ctx.fillStyle='#ff6b35';ctx.textAlign='center';
  ctx.shadowColor='#ff6b35';ctx.shadowBlur=12;
  ctx.fillText(active?String(Math.round(brg)).padStart(3,'0')+'°':'---°',cx,cy+r*0.38);
  ctx.shadowBlur=0;

  // inner ring
  ctx.beginPath();ctx.arc(cx,cy,r-2,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,212,255,0.18)';ctx.lineWidth=1;ctx.stroke();
}

function updateHSI(){
  const active = !!(pos && selWp);
  const brg  = active ? calcBrg(pos.lat,pos.lon,selWp.lat,selWp.lon) : 0;
  const dist = active ? calcNM(pos.lat,pos.lon,selWp.lat,selWp.lon) : 0;
  const ete  = fmtEte(dist, gs);

  drawHSI(brg, active);

  document.getElementById('d-brg').textContent  = active ? String(Math.round(brg)).padStart(3,'0')+'°' : '---°';
  document.getElementById('d-dist').textContent = active ? dist.toFixed(1) : '---';
  document.getElementById('d-ete').textContent  = active ? ete : '--:--';
  // ETA JST
  if(active && gs>0 && dist>0){
    const arrMs = Date.now() + (dist/gs)*3600000;
    const jst = new Date(arrMs + 9*3600000);
    document.getElementById('d-eta').textContent =
      String(jst.getUTCHours()).padStart(2,'0')+':'+String(jst.getUTCMinutes()).padStart(2,'0');
  } else {
    document.getElementById('d-eta').textContent = '--:--';
  }
}

// ── File Import ───────────────────────────────────────────────────────────────
// タグ名に名前空間が付いていても取れるヘルパー
function getTagText(el, tag){
  // 完全一致
  let found = el.querySelector(tag);
  if(found) return found.textContent.trim();
  // 名前空間付き（例: kml:name）を総当たり
  for(const c of el.getElementsByTagName('*')){
    if(c.localName===tag) return c.textContent.trim();
  }
  return '';
}

function parseGPX(text){
  const doc=new DOMParser().parseFromString(text,'application/xml');
  // パースエラー確認
  if(doc.querySelector('parsererror')) throw new Error('GPXファイルの解析に失敗しました');
  let nodes=[...doc.getElementsByTagName('wpt')];
  if(nodes.length===0){
    nodes=[...doc.getElementsByTagName('rtept')];
  }
  if(nodes.length===0){
    nodes=[...doc.getElementsByTagName('trkpt')];
  }
  const res=[];
  for(const w of nodes){
    const lat=parseFloat(w.getAttribute('lat')),lon=parseFloat(w.getAttribute('lon'));
    if(isNaN(lat)||isNaN(lon)) continue;
    const name=getTagText(w,'name')||`WPT${res.length+1}`;
    const desc=getTagText(w,'desc')||getTagText(w,'cmt')||'';
    const id=name.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,8)||`W${String(res.length+1).padStart(4,'0')}`;
    res.push({id,name,lat,lon,desc});
    if(res.length>=10000) break;
  }
  return res;
}

function parseKML(text){
  // KMLの名前空間を除去してからパース（最も確実な方法）
  const stripped = text.replace(/xmlns[^"]*"[^"]*"/g,'').replace(/\s+xmlns\S*/g,'');
  const doc=new DOMParser().parseFromString(stripped,'application/xml');
  if(doc.querySelector('parsererror')) throw new Error('KMLファイルの解析に失敗しました');
  const res=[];
  const placemarks=[...doc.getElementsByTagName('Placemark')];
  for(const pm of placemarks){
    const name=getTagText(pm,'name')||`WPT${res.length+1}`;
    // coordinates タグを探す（Point下でなくても拾う）
    let coordsText='';
    for(const c of pm.getElementsByTagName('coordinates')){
      coordsText=c.textContent.trim();
      if(coordsText) break;
    }
    if(!coordsText) continue;
    // "lon,lat,alt" 形式
    const parts=coordsText.trim().split(/[\s,]+/);
    const lon=parseFloat(parts[0]),lat=parseFloat(parts[1]);
    if(isNaN(lat)||isNaN(lon)) continue;
    const desc=getTagText(pm,'description')||'';
    const id=name.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,8)||`K${String(res.length+1).padStart(4,'0')}`;
    res.push({id,name,lat,lon,desc});
    if(res.length>=10000) break;
  }
  return res;
}

async function handleFile(e){
  const file=e.target.files[0]; if(!file) return;
  const btn=document.getElementById('btn-import');
  btn.textContent='読み込み中...'; btn.disabled=true;
  await new Promise(r=>setTimeout(r,50));
  try{
    const ext=file.name.split('.').pop().toLowerCase();
    let wps=[];
    if(ext==='gpx'){
      const text=await file.text();
      wps=parseGPX(text);
    } else if(ext==='kmz' || ext==='kml'){
      // まずZIP(KMZ)として試みる
      let kmlText=null;
      try{
        const buf=await file.arrayBuffer();
        const zip=await JSZip.loadAsync(buf);
        // doc.kml または最初の.kmlファイルを探す
        const kmlFile=zip.file('doc.kml') || zip.file(/\.kml$/i)[0];
        if(kmlFile) kmlText=await kmlFile.async('string');
      }catch(zipErr){ /* ZIPでなければ通常KMLとして処理 */ }
      if(!kmlText) kmlText=await file.text();
      wps=parseKML(kmlText);
    } else{ showToast('GPX / KML / KMZを選択してください',true); return; }

    if(wps.length===0){ showToast('WPが見つかりません（フォーマット確認）',true); return; }

    // ID重複解決
    const seen=new Map();
    wpDB=wps.map(w=>{
      let id=w.id;
      if(seen.has(id)){ const n=seen.get(id)+1; seen.set(id,n); id=`${id.slice(0,6)}${String(n).padStart(2,'0')}`; }
      else seen.set(id,1);
      return{...w,id};
    });
    clearSel();
    saveDB();
    document.getElementById('import-hint').style.display='none';
    document.getElementById('import-info').style.display='';
    document.getElementById('import-info').textContent=`📄 ${file.name}  |  ${wpDB.length.toLocaleString()} waypoints`;
    document.getElementById('btn-clrdb').style.display='';
    document.getElementById('wp-section').style.display='block';
    document.getElementById('hsi-wp-section').style.display = currentTab==='hsi' ? 'block' : 'none';
    hsiFiltered=[...wpDB]; onHsiSearch(); onSearch();
    showToast(`${wpDB.length.toLocaleString()}件をインポートしました`);
  }catch(err){
    showToast('エラー: '+err.message, true);
    console.error(err);
  }finally{
    btn.textContent='📂  GPX / KML / KMZ インポート'; btn.disabled=false;
    e.target.value='';
  }
}

// ── Leaflet Map ───────────────────────────────────────────────────────────────
function initMap(){
  if(map) return; // 既に初期化済み

  map = L.map('map', {
    center: [35.68, 139.76],
    zoom: 10,
    zoomControl: true,
    attributionControl: true,
  });

  // 国土地理院タイル（標準地図）
  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
    attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">国土地理院</a>',
    maxZoom: 18,
    minZoom: 5,
  }).addTo(map);

  // 現在地マーカー（青い点）
  const posIcon = L.divIcon({
    html: '<div style="width:14px;height:14px;border-radius:50%;background:#00d4ff;border:2px solid #fff;box-shadow:0 0 10px rgba(0,212,255,0.8);"></div>',
    className: '',
    iconSize: [14,14],
    iconAnchor: [7,7],
  });

  // WPマーカー（オレンジ三角）
  const wpIcon = L.divIcon({
    html: '<div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:16px solid #ff6b35;filter:drop-shadow(0 0 4px rgba(255,107,53,0.8));"></div>',
    className: '',
    iconSize: [16,16],
    iconAnchor: [8,16],
  });

  posMarker = L.marker([35.68,139.76], {icon:posIcon, zIndexOffset:1000});
  wpMarker  = L.marker([35.68,139.76], {icon:wpIcon,  zIndexOffset:999});
  routeLine = L.polyline([], {color:'#9b5de5', weight:3, opacity:0.9});

  routeLine.addTo(map);
}


function calcEta(nm, g){
  if(!nm||!g||g<=0||nm<=0) return '--:--';
  const arrMs = Date.now() + (nm/g)*3600000;
  const jst = new Date(arrMs + 9*3600000);
  return String(jst.getUTCHours()).padStart(2,'0')+':'+String(jst.getUTCMinutes()).padStart(2,'0')+' JST';
}
function updateMap(){
  if(!map) return;
  const hasSel = !!selWp;
  const hasPos = !!pos;

  // 現在地マーカー
  if(hasPos){
    posMarker.setLatLng([pos.lat, pos.lon]);
    if(!map.hasLayer(posMarker)) posMarker.addTo(map);
  } else {
    if(map.hasLayer(posMarker)) map.removeLayer(posMarker);
  }

  // WPマーカー
  if(hasSel){
    wpMarker.setLatLng([selWp.lat, selWp.lon]);
    wpMarker.bindTooltip(selWp.id, {permanent:true, direction:'top', offset:[0,-10], className:'wp-label', opacity:0.9});
    if(!map.hasLayer(wpMarker)) wpMarker.addTo(map);
  } else {
    if(map.hasLayer(wpMarker)) map.removeLayer(wpMarker);
  }

  // 経路ライン
  if(hasPos && hasSel){
    routeLine.setLatLngs([[pos.lat,pos.lon],[selWp.lat,selWp.lon]]);
    const brg  = calcBrg(pos.lat,pos.lon,selWp.lat,selWp.lon);
    const dist = calcNM(pos.lat,pos.lon,selWp.lat,selWp.lon);
    const ete  = fmtEte(dist,gs);
    const eta  = calcEta(dist,gs);
    document.getElementById('mc-brg').textContent  = String(Math.round(brg)).padStart(3,'0')+'°M';
    document.getElementById('mc-dist').textContent = dist.toFixed(1);
    document.getElementById('mc-ete').textContent  = ete;
    document.getElementById('mc-eta').textContent  = eta;
    map.fitBounds([[pos.lat,pos.lon],[selWp.lat,selWp.lon]], {padding:[40,40]});
  } else if(hasSel){
    routeLine.setLatLngs([]);
    map.setView([selWp.lat,selWp.lon], 12);
    document.getElementById('mc-brg').textContent='---°';
    document.getElementById('mc-dist').textContent='---';
    document.getElementById('mc-ete').textContent='--:--';
    document.getElementById('mc-eta').textContent='--:--';
  } else if(hasPos){
    routeLine.setLatLngs([]);
    map.setView([pos.lat,pos.lon], 12);
    document.getElementById('mc-brg').textContent='---°';
    document.getElementById('mc-dist').textContent='---';
    document.getElementById('mc-ete').textContent='--:--';
    document.getElementById('mc-eta').textContent='--:--';
  } else {
    routeLine.setLatLngs([]);
    document.getElementById('mc-brg').textContent='---°';
    document.getElementById('mc-dist').textContent='---';
    document.getElementById('mc-ete').textContent='--:--';
    document.getElementById('mc-eta').textContent='--:--';
  }
}
